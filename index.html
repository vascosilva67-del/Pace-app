<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>PACE.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { box-sizing: border-box; }
  body { margin: 0; background: #101214; }
  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  input, select { font-family: 'Inter', sans-serif; }
  input:focus, select:focus { outline: none; border-color: #FF4B2B !important; }
  ::placeholder { color: #5A5F64; }
  .scrollx::-webkit-scrollbar { height: 6px; }
  .scrollx::-webkit-scrollbar-thumb { background: #2A2E33; border-radius: 3px; }
  .chip { font-size: 11px; color: #8B9096; background: #101214; border: 1px solid #2A2E33; padding: 2px 7px; border-radius: 6px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const STANDARD = [
  { key: "1k", label: "1K", km: 1 },
  { key: "5k", label: "5K", km: 5 },
  { key: "10k", label: "10K", km: 10 },
  { key: "15k", label: "15K", km: 15 },
  { key: "half", label: "Half", km: 21.0975 },
  { key: "30k", label: "30K", km: 30 },
  { key: "marathon", label: "Marathon", km: 42.195 },
];
const WEATHER_OPTIONS = ["None", "Ideal", "Hot", "Cold", "Rain", "Windy", "Humid"];

function nearestStandard(km) {
  let best = null, bestDiff = Infinity;
  for (const s of STANDARD) {
    const diff = Math.abs(s.km - km) / s.km;
    if (diff < 0.03 && diff < bestDiff) { best = s; bestDiff = diff; }
  }
  return best;
}
function parseTime(str) {
  if (str == null) return null;
  const parts = String(str).split(":").map((p) => p.trim()).filter((p) => p !== "");
  if (parts.some((p) => isNaN(Number(p)))) return null;
  let secs = 0;
  if (parts.length === 3) secs = (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
  else if (parts.length === 2) secs = (+parts[0]) * 60 + (+parts[1]);
  else if (parts.length === 1) secs = +parts[0];
  else return null;
  return secs > 0 ? secs : null;
}
function formatTime(secs) {
  if (secs == null || !isFinite(secs)) return "--";
  secs = Math.round(secs);
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  return `${m}:${String(s).padStart(2, "0")}`;
}
function formatPace(secsPerKm) {
  if (!secsPerKm || !isFinite(secsPerKm)) return "--";
  const m = Math.floor(secsPerKm / 60);
  const s = Math.round(secsPerKm % 60);
  return `${m}:${String(s).padStart(2, "0")}/km`;
}
function safeIsoDate(v) {
  const d = new Date(v);
  if (isNaN(d.getTime())) return new Date().toISOString().slice(0, 10);
  return d.toISOString().slice(0, 10);
}
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = ((lat2 - lat1) * Math.PI) / 180;
  const dLon = ((lon2 - lon1) * Math.PI) / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
const uid = () => Math.random().toString(36).slice(2, 10);

function findHeader(headers, includesArr) {
  return headers.find((h) => includesArr.some((inc) => h.toLowerCase().includes(inc)));
}
function parseCsvText(text) {
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  const headers = result.meta.fields || [];
  const dateKey = findHeader(headers, ["activity date", "date"]);
  const nameKey = findHeader(headers, ["activity name", "name"]);
  const typeKey = findHeader(headers, ["activity type", "type"]);
  const distKey = findHeader(headers, ["distance"]);
  const timeKey = findHeader(headers, ["elapsed time", "moving time", "time"]);
  const elevKey = findHeader(headers, ["elevation gain", "elevation"]);
  return result.data.map((row) => {
    const rawDist = distKey ? parseFloat(row[distKey]) : NaN;
    const km = isFinite(rawDist) ? (rawDist > 1000 ? rawDist / 1000 : rawDist) : null;
    const rawTime = timeKey ? parseFloat(row[timeKey]) : NaN;
    const seconds = isFinite(rawTime) ? rawTime : null;
    const type = typeKey ? String(row[typeKey] || "") : "";
    return {
      id: uid(), include: type ? type.toLowerCase().includes("run") : true,
      name: nameKey ? row[nameKey] || "Imported run" : "Imported run",
      date: dateKey ? safeIsoDate(row[dateKey]) : safeIsoDate(Date.now()),
      km, seconds, elevationM: elevKey ? parseFloat(row[elevKey]) || null : null, type,
    };
  }).filter((r) => r.km || r.seconds);
}
function parseGpxText(text, filename) {
  const xml = new DOMParser().parseFromString(text, "application/xml");
  if (xml.querySelector("parsererror")) return [];
  const pts = Array.from(xml.getElementsByTagName("trkpt"));
  if (pts.length === 0) return [];
  let distKm = 0, elevGain = 0, prevLat = null, prevLon = null, prevEle = null;
  const times = [];
  for (const pt of pts) {
    const lat = parseFloat(pt.getAttribute("lat"));
    const lon = parseFloat(pt.getAttribute("lon"));
    const eleNode = pt.getElementsByTagName("ele")[0];
    const timeNode = pt.getElementsByTagName("time")[0];
    const ele = eleNode ? parseFloat(eleNode.textContent) : null;
    if (timeNode) times.push(timeNode.textContent);
    if (prevLat != null) {
      distKm += haversineKm(prevLat, prevLon, lat, lon);
      if (ele != null && prevEle != null && ele > prevEle) elevGain += ele - prevEle;
    }
    prevLat = lat; prevLon = lon; prevEle = ele;
  }
  const seconds = times.length >= 2 ? (new Date(times[times.length - 1]) - new Date(times[0])) / 1000 : null;
  const nameNode = xml.getElementsByTagName("name")[0];
  const name = nameNode ? nameNode.textContent : filename.replace(/\.gpx$/i, "");
  return [{ id: uid(), include: true, name, date: times.length ? safeIsoDate(times[0]) : safeIsoDate(Date.now()),
    km: Math.round(distKm * 100) / 100, seconds: seconds ? Math.round(seconds) : null, elevationM: Math.round(elevGain), type: "Run" }];
}

function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; }
}

function App() {
  const [tab, setTab] = useState("races");
  const [races, setRaces] = useState(() => loadLS("pace_races", []));
  const [goals, setGoals] = useState(() => loadLS("pace_goals", []));
  const [showRaceForm, setShowRaceForm] = useState(false);
  const [showGoalForm, setShowGoalForm] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [manualPRs, setManualPRs] = useState(() => loadLS("pace_manualPRs", {}));
  const [showManualPR, setShowManualPR] = useState(false);

  useEffect(() => { localStorage.setItem("pace_races", JSON.stringify(races)); }, [races]);
  useEffect(() => { localStorage.setItem("pace_goals", JSON.stringify(goals)); }, [goals]);
  useEffect(() => { localStorage.setItem("pace_manualPRs", JSON.stringify(manualPRs)); }, [manualPRs]);

  const prs = useMemo(() => {
    const map = {};
    for (const r of races) {
      if (r.excludeFromPR) continue;
      const std = nearestStandard(r.km) || { key: "other:" + r.km.toFixed(1), label: `${r.km} km`, km: r.km };
      if (!map[std.key] || r.seconds < map[std.key].seconds) map[std.key] = { ...r, label: std.label, km: std.km, source: "race" };
    }
    for (const std of STANDARD) {
      const manual = manualPRs[std.key];
      if (manual && manual.seconds) {
        if (!map[std.key] || manual.seconds < map[std.key].seconds) {
          map[std.key] = { id: "manual-" + std.key, name: manual.note || "PR manual", date: manual.date || null, km: std.km, seconds: manual.seconds, label: std.label, source: "manual" };
        }
      }
    }
    return map;
  }, [races, manualPRs]);
  const prList = useMemo(() => Object.values(prs).sort((a, b) => a.km - b.km), [prs]);

  function addRace(r) { setRaces((p) => [...p, r].sort((a, b) => new Date(b.date) - new Date(a.date))); setShowRaceForm(false); }
  function addRaces(list) { setRaces((p) => [...p, ...list].sort((a, b) => new Date(b.date) - new Date(a.date))); setShowImport(false); }
  function deleteRace(id) { setRaces((p) => p.filter((r) => r.id !== id)); }
  function addGoal(g) { setGoals((p) => [...p, g]); setShowGoalForm(false); }
  function deleteGoal(id) { setGoals((p) => p.filter((g) => g.id !== id)); }
  function setManualPR(key, data) {
    setManualPRs((prev) => (data ? { ...prev, [key]: data } : (() => { const n = { ...prev }; delete n[key]; return n; })()));
  }

  function exportBackup() {
    const payload = JSON.stringify({ races, goals, exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `pace-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }
  function restoreBackup(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data.races)) setRaces(data.races);
        if (Array.isArray(data.goals)) setGoals(data.goals);
      } catch (e) { alert("Não consegui ler este ficheiro."); }
    };
    reader.readAsText(file);
  }

  return (
    <div style={{ minHeight: "100vh", background: "#101214", color: "#F2F1ED", fontFamily: "'Inter', sans-serif" }}>
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "28px 20px 80px" }}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 6 }}>
          <h1 className="display" style={{ fontSize: 40, margin: 0, lineHeight: 1 }}>PACE<span style={{ color: "#FF4B2B" }}>.</span></h1>
          <span className="mono" style={{ fontSize: 12, color: "#5A5F64" }}>{races.length} corrida{races.length !== 1 ? "s" : ""}</span>
        </div>
        <p style={{ color: "#8B9096", fontSize: 14, marginTop: 0, marginBottom: 24 }}>Guardado neste telemóvel, offline.</p>

        <div style={{ display: "flex", gap: 4, background: "#1A1D21", padding: 4, borderRadius: 10, marginBottom: 24 }}>
          {[{ key: "races", label: "Corridas" }, { key: "prs", label: "PRs" }, { key: "goals", label: "Objetivos" }].map((t) => (
            <button key={t.key} onClick={() => setTab(t.key)} style={{ flex: 1, padding: "9px 0", borderRadius: 7, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600, background: tab === t.key ? "#FF4B2B" : "transparent", color: tab === t.key ? "#101214" : "#8B9096" }}>{t.label}</button>
          ))}
        </div>

        {tab === "races" && prList.length > 0 && (
          <div className="scrollx" style={{ display: "flex", gap: 10, overflowX: "auto", marginBottom: 24, paddingBottom: 4 }}>
            {prList.map((pr) => (
              <div key={pr.label} style={{ minWidth: 128, background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 12, padding: 14, flexShrink: 0 }}>
                <div style={{ fontSize: 11, color: "#8B9096", fontWeight: 600, textTransform: "uppercase" }}>{pr.label}</div>
                <div className="mono" style={{ fontSize: 22, fontWeight: 700, marginTop: 4, color: "#38D97F" }}>{formatTime(pr.seconds)}</div>
                <div style={{ fontSize: 11, color: "#5A5F64", marginTop: 2 }}>{pr.name}</div>
              </div>
            ))}
          </div>
        )}

        {tab === "races" && <RacesTab races={races} onAdd={() => setShowRaceForm(true)} onImport={() => setShowImport(true)} onDelete={deleteRace} prs={prs} />}
        {tab === "prs" && <PrsTab prList={prList} races={races} onEditManual={() => setShowManualPR(true)} />}
        {tab === "goals" && <GoalsTab goals={goals} prs={prs} onAdd={() => setShowGoalForm(true)} onDelete={deleteGoal} />}

        <BackupBar onExport={exportBackup} onRestore={restoreBackup} />
      </div>

      {showRaceForm && <RaceForm onSave={addRace} onClose={() => setShowRaceForm(false)} />}
      {showGoalForm && <GoalForm onSave={addGoal} onClose={() => setShowGoalForm(false)} />}
      {showImport && <ImportModal onSave={addRaces} onClose={() => setShowImport(false)} />}
      {showManualPR && <ManualPRModal manualPRs={manualPRs} races={races} onSave={setManualPR} onClose={() => setShowManualPR(false)} />}
    </div>
  );
}

function BackupBar({ onExport, onRestore }) {
  const inputRef = useRef(null);
  return (
    <div style={{ display: "flex", justifyContent: "center", gap: 18, marginTop: 36, paddingTop: 18, borderTop: "1px solid #1E2124" }}>
      <input ref={inputRef} type="file" accept=".json" style={{ display: "none" }} onChange={(e) => { if (e.target.files[0]) onRestore(e.target.files[0]); e.target.value = ""; }} />
      <button onClick={onExport} style={{ background: "none", border: "none", color: "#5A5F64", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>Exportar backup</button>
      <button onClick={() => inputRef.current.click()} style={{ background: "none", border: "none", color: "#5A5F64", fontSize: 12, cursor: "pointer", textDecoration: "underline" }}>Restaurar backup</button>
    </div>
  );
}

function EmptyState({ icon, title, subtitle }) {
  return (
    <div style={{ textAlign: "center", padding: "50px 20px", color: "#5A5F64" }}>
      <div style={{ fontSize: 26, marginBottom: 10, opacity: 0.6 }}>{icon}</div>
      <div style={{ color: "#8B9096", fontSize: 14, fontWeight: 600 }}>{title}</div>
      <div style={{ fontSize: 13, marginTop: 4 }}>{subtitle}</div>
    </div>
  );
}
function weatherChipText(w) {
  if (!w || !w.condition || w.condition === "None") return null;
  return w.tempC != null && w.tempC !== "" ? `${w.condition} · ${w.tempC}°C` : w.condition;
}

function RacesTab({ races, onAdd, onImport, onDelete, prs }) {
  const isPR = (r) => {
    const std = nearestStandard(r.km) || { key: "other:" + r.km.toFixed(1) };
    return prs[std.key] && prs[std.key].id === r.id;
  };
  return (
    <div>
      <div style={{ display: "flex", gap: 8 }}>
        <AddButton label="+ Registar corrida" onClick={onAdd} />
        <IconButton label="↑ Import" onClick={onImport} />
      </div>
      {races.length === 0 ? <EmptyState icon="📅" title="Ainda sem corridas" subtitle="Regista um resultado ou importa do Strava." /> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
          {races.map((r) => {
            const wChip = weatherChipText(r.weather);
            return (
              <div key={r.id} style={{ background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 12, padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontWeight: 600, fontSize: 15 }}>{r.name}</span>
                    {isPR(r) && <span style={{ fontSize: 10, fontWeight: 700, color: "#38D97F", background: "#38D97F22", padding: "2px 6px", borderRadius: 4 }}>PR</span>}
                    {r.excludeFromPR && <span style={{ fontSize: 10, fontWeight: 700, color: "#8B9096", background: "#8B909622", padding: "2px 6px", borderRadius: 4 }}>fora do PR</span>}
                  </div>
                  <div style={{ fontSize: 12, color: "#8B9096", marginTop: 3 }}>{r.date} · {r.km} km · {formatPace(r.seconds / r.km)}</div>
                  {(r.elevationM || wChip || (r.surface && r.surface !== "Road")) && (
                    <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                      {r.surface && r.surface !== "Road" ? <span className="chip">{r.surface}</span> : null}
                      {r.elevationM ? <span className="chip">+{r.elevationM}m elev</span> : null}
                      {wChip ? <span className="chip">{wChip}</span> : null}
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span className="mono" style={{ fontSize: 18, fontWeight: 700 }}>{formatTime(r.seconds)}</span>
                  <button onClick={() => onDelete(r.id)} style={{ background: "none", border: "none", color: "#5A5F64", cursor: "pointer", fontSize: 15 }}>✕</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PrsTab({ prList, races, onEditManual }) {
  const totalKm = races.reduce((s, r) => s + r.km, 0);
  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <StatCard label="Distância total" value={`${totalKm.toFixed(1)} km`} />
        <StatCard label="Corridas" value={races.length} />
      </div>
      <AddButton label="+ Definir PR manual" onClick={onEditManual} />
      {prList.length === 0 ? <EmptyState icon="🏆" title="Sem PRs ainda" subtitle="Regista corridas para construir a tua tabela." /> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
          {prList.map((pr) => (
            <div key={pr.label} style={{ background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 12, padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 12, color: "#8B9096", fontWeight: 600, textTransform: "uppercase" }}>{pr.label}</span>
                  {pr.source === "manual" && <span style={{ fontSize: 9, fontWeight: 700, color: "#FFC24B", background: "#FFC24B22", padding: "1px 6px", borderRadius: 4 }}>manual</span>}
                </div>
                <div style={{ fontSize: 12, color: "#5A5F64", marginTop: 3 }}>{pr.name}{pr.date ? ` · ${pr.date}` : ""}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div className="mono" style={{ fontSize: 24, fontWeight: 700, color: pr.source === "manual" ? "#FFC24B" : "#38D97F" }}>{formatTime(pr.seconds)}</div>
                <div className="mono" style={{ fontSize: 11, color: "#5A5F64" }}>{formatPace(pr.seconds / pr.km)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function StatCard({ label, value }) {
  return (
    <div style={{ flex: 1, background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 12, padding: "14px 16px" }}>
      <div style={{ fontSize: 11, color: "#8B9096", fontWeight: 600, textTransform: "uppercase" }}>{label}</div>
      <div className="mono" style={{ fontSize: 22, fontWeight: 700, marginTop: 4 }}>{value}</div>
    </div>
  );
}

function GoalsTab({ goals, prs, onAdd, onDelete }) {
  return (
    <div>
      <AddButton label="+ Definir objetivo" onClick={onAdd} />
      {goals.length === 0 ? <EmptyState icon="🎯" title="Sem objetivos" subtitle="Define uma corrida e tempo alvo." /> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 16 }}>
          {goals.map((g) => {
            const std = STANDARD.find((s) => s.key === g.distanceKey);
            const currentPR = std ? prs[std.key] : null;
            const daysLeft = Math.ceil((new Date(g.date) - new Date()) / 86400000);
            const gapSecs = currentPR ? currentPR.seconds - g.seconds : null;
            return (
              <div key={g.id} style={{ background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 12, padding: "16px 18px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 15 }}>{g.name}</div>
                    <div style={{ fontSize: 12, color: "#8B9096", marginTop: 3 }}>{std ? std.label : `${g.km} km`} · alvo {formatTime(g.seconds)}</div>
                  </div>
                  <button onClick={() => onDelete(g.id)} style={{ background: "none", border: "none", color: "#5A5F64", cursor: "pointer", fontSize: 15 }}>✕</button>
                </div>
                <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
                  <div>
                    <div style={{ fontSize: 10, color: "#5A5F64", textTransform: "uppercase" }}>Dia da corrida</div>
                    <div className="mono" style={{ fontSize: 13, marginTop: 2, color: daysLeft < 0 ? "#5A5F64" : "#F2F1ED" }}>{daysLeft < 0 ? "passou" : `${daysLeft}d`}</div>
                  </div>
                  {gapSecs != null && (
                    <div>
                      <div style={{ fontSize: 10, color: "#5A5F64", textTransform: "uppercase" }}>Falta para o PR</div>
                      <div className="mono" style={{ fontSize: 13, marginTop: 2, color: gapSecs > 0 ? "#FFC24B" : "#38D97F" }}>{gapSecs > 0 ? `-${formatTime(gapSecs)}` : "já lá chegaste"}</div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AddButton({ label, onClick }) {
  return <button onClick={onClick} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "none", border: "1px dashed #2A2E33", color: "#8B9096", borderRadius: 12, padding: "12px 16px", cursor: "pointer", fontSize: 14, fontWeight: 500 }}>{label}</button>;
}
function IconButton({ label, onClick }) {
  return <button onClick={onClick} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, background: "none", border: "1px dashed #2A2E33", color: "#8B9096", borderRadius: 12, padding: "12px 16px", cursor: "pointer", fontSize: 14, fontWeight: 500 }}>{label}</button>;
}
function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000AA", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: "#16181B", borderTop: "1px solid #2A2E33", borderRadius: "16px 16px 0 0", padding: "20px 20px 28px", width: "100%", maxWidth: 720, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <h2 className="display" style={{ fontSize: 24, margin: 0 }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#8B9096", cursor: "pointer", fontSize: 18 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}
function fieldStyle() { return { width: "100%", background: "#101214", border: "1px solid #2A2E33", borderRadius: 8, padding: "10px 12px", color: "#F2F1ED", fontSize: 14, marginTop: 6 }; }
function labelStyle() { return { fontSize: 12, color: "#8B9096", fontWeight: 600 }; }

function RaceForm({ onSave, onClose }) {
  const [name, setName] = useState("");
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const [distancePreset, setDistancePreset] = useState("5k");
  const [customKm, setCustomKm] = useState("");
  const [timeStr, setTimeStr] = useState("");
  const [elevation, setElevation] = useState("");
  const [weatherCondition, setWeatherCondition] = useState("None");
  const [tempC, setTempC] = useState("");
  const [surface, setSurface] = useState("Road");
  const [excludeFromPR, setExcludeFromPR] = useState(false);
  const [error, setError] = useState("");
  function submit() {
    const secs = parseTime(timeStr);
    const km = distancePreset === "custom" ? parseFloat(customKm) : STANDARD.find((s) => s.key === distancePreset).km;
    if (!name.trim()) return setError("Dá um nome à corrida.");
    if (!km || km <= 0) return setError("Distância inválida.");
    if (!secs) return setError("Tempo no formato mm:ss ou hh:mm:ss.");
    onSave({ id: uid(), name: name.trim(), date, km, seconds: secs, elevationM: elevation ? parseFloat(elevation) : null, weather: weatherCondition !== "None" ? { condition: weatherCondition, tempC: tempC !== "" ? parseFloat(tempC) : null } : null, surface, excludeFromPR });
  }
  return (
    <Modal title="Registar corrida" onClose={onClose}>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <label><div style={labelStyle()}>Nome</div><input style={fieldStyle()} value={name} onChange={(e) => setName(e.target.value)} placeholder="ex: Meia de Lisboa" /></label>
        <label><div style={labelStyle()}>Data</div><input type="date" style={fieldStyle()} value={date} onChange={(e) => setDate(e.target.value)} /></label>
        <label><div style={labelStyle()}>Distância</div>
          <select style={fieldStyle()} value={distancePreset} onChange={(e) => setDistancePreset(e.target.value)}>
            {STANDARD.map((s) => <option key={s.key} value={s.key}>{s.label} ({s.km} km)</option>)}
            <option value="custom">Personalizada</option>
          </select>
        </label>
        {distancePreset === "custom" && <label><div style={labelStyle()}>Km</div><input style={fieldStyle()} value={customKm} onChange={(e) => setCustomKm(e.target.value)} placeholder="ex: 15" /></label>}
        <label><div style={labelStyle()}>Tempo</div><input style={fieldStyle()} value={timeStr} onChange={(e) => setTimeStr(e.target.value)} placeholder="mm:ss ou hh:mm:ss" /></label>
        <div style={{ display: "flex", gap: 10 }}>
          <label style={{ flex: 1 }}><div style={labelStyle()}>Elevação (m)</div><input style={fieldStyle()} value={elevation} onChange={(e) => setElevation(e.target.value)} placeholder="opcional" /></label>
          <label style={{ flex: 1 }}><div style={labelStyle()}>Temp (°C)</div><input style={fieldStyle()} value={tempC} onChange={(e) => setTempC(e.target.value)} placeholder="opcional" /></label>
        </div>
        <label><div style={labelStyle()}>Clima</div><select style={fieldStyle()} value={weatherCondition} onChange={(e) => setWeatherCondition(e.target.value)}>{WEATHER_OPTIONS.map((w) => <option key={w} value={w}>{w}</option>)}</select></label>
        <label><div style={labelStyle()}>Superfície</div><select style={fieldStyle()} value={surface} onChange={(e) => setSurface(e.target.value)}>{["Road", "Trail", "Track"].map((s) => <option key={s} value={s}>{s}</option>)}</select></label>
        <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
          <input type="checkbox" checked={excludeFromPR} onChange={(e) => setExcludeFromPR(e.target.checked)} />
          <span style={{ fontSize: 13, color: "#8B9096" }}>Não contar esta corrida para PRs</span>
        </label>
        {error && <div style={{ color: "#FF4B2B", fontSize: 13 }}>{error}</div>}
        <button onClick={submit} style={{ background: "#FF4B2B", border: "none", color: "#101214", fontWeight: 700, borderRadius: 8, padding: "12px 0", fontSize: 14, cursor: "pointer", marginTop: 4 }}>Guardar</button>
      </div>
    </Modal>
  );
}
function GoalForm({ onSave, onClose }) {
  const [name, setName] = useState("");
  const [date, setDate] = useState("");
  const [distanceKey, setDistanceKey] = useState("5k");
  const [timeStr, setTimeStr] = useState("");
  const [error, setError] = useState("");
  function submit() {
    const secs = parseTime(timeStr);
    if (!name.trim()) return setError("Dá um nome ao objetivo.");
    if (!date) return setError("Escolhe uma data.");
    if (!secs) return setError("Tempo no formato mm:ss ou hh:mm:ss.");
    const std = STANDARD.find((s) => s.key === distanceKey);
    onSave({ id: uid(), name: name.trim(), date, distanceKey, km: std.km, seconds: secs });
  }
  return (
    <Modal title="Definir objetivo" onClose={onClose}>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <label><div style={labelStyle()}>Nome</div><input style={fieldStyle()} value={name} onChange={(e) => setName(e.target.value)} placeholder="ex: Sub-1:45 meia" /></label>
        <label><div style={labelStyle()}>Data da corrida</div><input type="date" style={fieldStyle()} value={date} onChange={(e) => setDate(e.target.value)} /></label>
        <label><div style={labelStyle()}>Distância</div><select style={fieldStyle()} value={distanceKey} onChange={(e) => setDistanceKey(e.target.value)}>{STANDARD.map((s) => <option key={s.key} value={s.key}>{s.label} ({s.km} km)</option>)}</select></label>
        <label><div style={labelStyle()}>Tempo alvo</div><input style={fieldStyle()} value={timeStr} onChange={(e) => setTimeStr(e.target.value)} placeholder="mm:ss ou hh:mm:ss" /></label>
        {error && <div style={{ color: "#FF4B2B", fontSize: 13 }}>{error}</div>}
        <button onClick={submit} style={{ background: "#FF4B2B", border: "none", color: "#101214", fontWeight: 700, borderRadius: 8, padding: "12px 0", fontSize: 14, cursor: "pointer", marginTop: 4 }}>Guardar</button>
      </div>
    </Modal>
  );
}
function ManualPRModal({ manualPRs, races, onSave, onClose }) {
  const [distanceKey, setDistanceKey] = useState(STANDARD[0].key);
  const [timeStr, setTimeStr] = useState("");
  const [note, setNote] = useState("");
  const [date, setDate] = useState("");
  const [linkedRaceId, setLinkedRaceId] = useState("");
  const [error, setError] = useState("");
  const existing = manualPRs[distanceKey];
  function handleLinkRace(id) {
    setLinkedRaceId(id);
    const r = races.find((x) => x.id === id);
    if (r) { setNote(r.name); setDate(r.date); }
  }
  function submit() {
    const secs = parseTime(timeStr);
    if (!secs) return setError("Tempo no formato mm:ss ou hh:mm:ss.");
    onSave(distanceKey, { seconds: secs, note: note.trim() || null, date: date || null });
    onClose();
  }
  function clear() { onSave(distanceKey, null); onClose(); }
  return (
    <Modal title="PR manual" onClose={onClose}>
      <div style={{ fontSize: 13, color: "#8B9096", marginBottom: 14, lineHeight: 1.5 }}>
        Para distâncias que raramente corres oficialmente — como um parcial dentro de uma corrida mais longa. É substituído automaticamente assim que registares uma corrida exatamente nessa distância que seja mais rápida.
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <label><div style={labelStyle()}>Distância</div><select style={fieldStyle()} value={distanceKey} onChange={(e) => setDistanceKey(e.target.value)}>{STANDARD.map((s) => <option key={s.key} value={s.key}>{s.label} ({s.km} km)</option>)}</select></label>
        {races.length > 0 && (
          <label>
            <div style={labelStyle()}>Veio de uma corrida registada? (opcional)</div>
            <select style={fieldStyle()} value={linkedRaceId} onChange={(e) => handleLinkRace(e.target.value)}>
              <option value="">— nenhuma, escrever à mão —</option>
              {races.map((r) => <option key={r.id} value={r.id}>{r.name} ({r.date})</option>)}
            </select>
          </label>
        )}
        <label><div style={labelStyle()}>Tempo a esta distância</div><input style={fieldStyle()} value={timeStr} onChange={(e) => setTimeStr(e.target.value)} placeholder="mm:ss ou hh:mm:ss" /></label>
        <label><div style={labelStyle()}>Corrida / nota</div><input style={fieldStyle()} value={note} onChange={(e) => setNote(e.target.value)} placeholder="ex: parcial da Meia do Porto" /></label>
        <label><div style={labelStyle()}>Data (opcional)</div><input type="date" style={fieldStyle()} value={date} onChange={(e) => setDate(e.target.value)} /></label>
        {error && <div style={{ color: "#FF4B2B", fontSize: 13 }}>{error}</div>}
        <button onClick={submit} style={{ background: "#FF4B2B", border: "none", color: "#101214", fontWeight: 700, borderRadius: 8, padding: "12px 0", fontSize: 14, cursor: "pointer", marginTop: 4 }}>Guardar</button>
        {existing && <button onClick={clear} style={{ background: "none", border: "none", color: "#5A5F64", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>Remover PR manual desta distância</button>}
      </div>
    </Modal>
  );
}
function ImportModal({ onSave, onClose }) {
  const [rows, setRows] = useState([]);
  const [error, setError] = useState("");
  const [fileName, setFileName] = useState("");
  const inputRef = useRef(null);
  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setFileName(file.name); setError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      try {
        let parsed = [];
        if (file.name.toLowerCase().endsWith(".gpx")) {
          parsed = parseGpxText(text, file.name);
          if (parsed.length === 0) setError("Não encontrei pontos de percurso neste GPX.");
        } else {
          parsed = parseCsvText(text);
          if (parsed.length === 0) setError("Não encontrei colunas de distância/tempo neste CSV.");
        }
        setRows(parsed);
      } catch (err) { setError("Não consegui ler este ficheiro."); }
    };
    reader.readAsText(file);
  }
  function updateRow(id, patch) { setRows((prev) => prev.map((r) => (r.id === id ? { ...r, ...patch } : r))); }
  function confirm() {
    const toAdd = rows.filter((r) => r.include).map((r) => ({ id: r.id, name: r.name || "Imported run", date: r.date, km: parseFloat(r.km), seconds: typeof r.seconds === "number" ? r.seconds : parseTime(r.seconds), elevationM: r.elevationM || null, weather: null })).filter((r) => r.km > 0 && r.seconds > 0);
    if (toAdd.length === 0) return setError("Nenhuma linha válida selecionada.");
    onSave(toAdd);
  }
  return (
    <Modal title="Importar do Strava" onClose={onClose}>
      <div style={{ fontSize: 13, color: "#8B9096", marginBottom: 14, lineHeight: 1.5 }}>Exporta as atividades do Strava (CSV) ou uma atividade individual (GPX) e carrega aqui.</div>
      <input ref={inputRef} type="file" accept=".csv,.gpx" onChange={handleFile} style={{ display: "none" }} />
      <button onClick={() => inputRef.current.click()} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", background: "none", border: "1px dashed #2A2E33", color: "#8B9096", borderRadius: 10, padding: 16, cursor: "pointer", fontSize: 14 }}>↑ {fileName || "Escolher ficheiro .csv ou .gpx"}</button>
      {error && <div style={{ color: "#FF4B2B", fontSize: 13, marginTop: 10 }}>{error}</div>}
      {rows.length > 0 && (
        <div style={{ marginTop: 18, display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ fontSize: 12, color: "#5A5F64" }}>{rows.filter((r) => r.include).length} de {rows.length} selecionadas</div>
          {rows.map((r) => (
            <div key={r.id} style={{ background: "#1A1D21", border: "1px solid #2A2E33", borderRadius: 10, padding: 12, opacity: r.include ? 1 : 0.5 }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 8 }}>
                <button onClick={() => updateRow(r.id, { include: !r.include })} style={{ width: 20, height: 20, borderRadius: 5, border: "1px solid #2A2E33", background: r.include ? "#38D97F" : "transparent", cursor: "pointer", flexShrink: 0 }}></button>
                <input style={{ ...fieldStyle(), marginTop: 0, flex: 1 }} value={r.name} onChange={(e) => updateRow(r.id, { name: e.target.value })} />
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <input type="date" style={{ ...fieldStyle(), marginTop: 0 }} value={r.date} onChange={(e) => updateRow(r.id, { date: e.target.value })} />
                <input style={{ ...fieldStyle(), marginTop: 0 }} value={r.km ?? ""} onChange={(e) => updateRow(r.id, { km: e.target.value })} placeholder="km" />
                <input style={{ ...fieldStyle(), marginTop: 0 }} value={typeof r.seconds === "number" ? formatTime(r.seconds) : r.seconds ?? ""} onChange={(e) => updateRow(r.id, { seconds: e.target.value })} placeholder="mm:ss" />
              </div>
            </div>
          ))}
          <button onClick={confirm} style={{ background: "#FF4B2B", border: "none", color: "#101214", fontWeight: 700, borderRadius: 8, padding: "12px 0", fontSize: 14, cursor: "pointer", marginTop: 6 }}>Importar selecionadas</button>
        </div>
      )}
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
